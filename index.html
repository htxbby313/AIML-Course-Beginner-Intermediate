<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Machine Learning Mastery Course</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='black'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='monospace' font-size='25' fill='%2300ff41'%3EAI%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #0d1117;
            color: #00ff41;
            padding: 1.5rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1180px;
            background: rgba(0, 24, 7, 0.92) !important;
            padding: 1.25rem !important;
        }
        .text-neon-green { color: #00ff41; }
        .bg-matrix-green { background-color: #004d00; }
        .border-neon-green { border-color: #00ff41; }
        .bg-terminal-code { background-color: #001a00; }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background-color: #00ff41;
            box-shadow: 0 0 10px #00ff41, 0 0 5px #00ff41;
            transition: width 0.5s ease-in-out;
            z-index: 50;
        }
        .quiz-option {
            display: block;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            line-height: 1.5;
            border: 1px solid rgba(0, 255, 65, 0.35);
            color: #d7ffe0;
            background: #101820;
            min-height: 48px;
        }
        .quiz-option:hover {
            transform: scale(1.01);
            box-shadow: 0 0 5px #00ff41;
        }
        .quiz-option.selected-answer {
            color: #ffffff;
            background: #006600 !important;
            border-color: #00ff41;
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.3);
        }
        .explanation {
            font-size: 0.875rem;
            color: #00e63c;
        }
        .correct-answer { background-color: #008000 !important; }
        .incorrect-answer { background-color: #b30000 !important; }
        pre {
            border: 1px solid #00ff41;
            padding: 1rem;
            border-radius: 0.5rem;
            white-space: pre;
            overflow-x: auto;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
            font-size: 0.875rem;
            line-height: 1.4;
            background: #020806;
        }
        .course-title {
            font-size: clamp(1.75rem, 4vw, 2.55rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 1rem;
            color: #00ff41;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.75);
            line-height: 1.2;
        }
        #course-content-container > .page-label {
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
        }
        #course-content-container > h2 {
            margin: 0.65rem 0 1rem;
            font-size: clamp(1rem, 2vw, 1.28rem);
            color: #00ff41;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .module-content h2 {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            text-shadow: 0 0 7px rgba(0, 255, 65, 0.65);
        }
        .module-content h3 {
            font-size: clamp(1.25rem, 3vw, 1.65rem);
            font-style: normal;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: #00e63c;
            text-shadow: 0 0 4px rgba(0, 230, 60, 0.45);
        }
        .module-content h4 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #00e63c;
        }
        .module-content p {
            margin-bottom: 1.25rem;
            line-height: 1.8;
            color: #d7ffe0;
        }
        .module-content strong {
            color: #ffffff;
        }
        .course-page {
            border: 1px solid rgba(0, 255, 65, 0.4);
            border-radius: 0.75rem;
            background: rgba(0, 10, 4, 0.82);
            padding: 1.25rem;
            margin: 1.5rem 0;
            box-shadow: 0 0 18px rgba(0, 255, 65, 0.12);
        }
        .page-label {
            display: inline-block;
            margin-bottom: 0.8rem;
            padding: 0.25rem 0.55rem;
            border: 1px solid #00ff41;
            border-radius: 999px;
            color: #001a00;
            background: #00ff41;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .lesson-page {
            display: none;
            min-height: 420px;
        }
        .lesson-page.active-page {
            display: block;
        }
        .lesson-pager {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin: 0.75rem 0 1rem;
            padding: 0.75rem;
            border: 1px solid rgba(0, 255, 65, 0.35);
            border-radius: 0.75rem;
            background: rgba(0, 0, 0, 0.28);
        }
        .lesson-pager-status {
            color: #d7ffe0;
            font-size: 0.9rem;
            text-align: center;
        }
        .lesson-pager-actions {
            display: flex;
            gap: 0.75rem;
        }
        .code-workspace {
            margin-top: 1rem;
            padding: 1rem;
            border: 1px dashed rgba(0, 255, 65, 0.55);
            border-radius: 0.75rem;
            background: rgba(0, 0, 0, 0.35);
        }
        .code-workspace label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ffffff;
            font-weight: 700;
        }
        .practice-editor {
            width: 100%;
            min-height: 180px;
            padding: 1rem;
            border: 1px solid rgba(0, 255, 65, 0.5);
            border-radius: 0.5rem;
            color: #d7ffe0;
            background: #020806;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.55;
            white-space: pre;
            overflow: auto;
            resize: vertical;
        }
        .workspace-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }
        .workspace-note {
            margin-top: 0.75rem;
            margin-bottom: 0;
            color: #9af7aa;
            font-size: 0.9rem;
        }
        .jupyter-markdown, .jupyter-code {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .jupyter-code {
            max-height: 180px;
            overflow: auto;
        }
        .quiz-container {
            border: 1px solid #00ff41;
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 0.75rem;
            background: rgba(0, 10, 4, 0.92);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }
        .action-button {
            background-color: #004d00;
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            transition: all 0.2s;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .action-button:hover {
            box-shadow: 0 0 15px #00ff41;
            background-color: #006600;
        }
        .action-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }
        .module-view { display: none; }
        .module-view.active { display: block; }
        .next-button-locked {
            pointer-events: none;
            opacity: 0.4;
            box-shadow: none;
            cursor: not-allowed;
        }
        .completion-message {
            border: 1px solid #00ff41;
            padding: 1.5rem;
            margin-top: 2rem;
            border-radius: 0.75rem;
            background-color: #001a00;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }
        .module-view::-webkit-scrollbar {
            display: none;
            width: 0 !important;
        }
        .module-view {
            scrollbar-width: none;
        }
        @media (max-width: 720px) {
            body { padding: 0.75rem; }
            .container { padding: 1rem !important; }
            .course-title { margin-bottom: 1.25rem; }
            .course-page { padding: 1rem; }
            .lesson-page { min-height: 0; }
            .lesson-pager,
            .lesson-pager-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .workspace-actions .action-button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container mx-auto p-8 bg-matrix-green rounded-lg shadow-md border border-neon-green">
        <div class="progress-bar" id="progressBar"></div>

        <header class="course-title">
            AI & Machine Learning Mastery Course
        </header>

        <div id="course-content-container" class="space-y-16">
            <!-- Content will be loaded here dynamically -->
        </div>

        <div class="flex justify-between mt-10" id="navigation-buttons-container">
            <button id="previousModuleBtn" onclick="previousModule()" class="action-button" style="display: none;">Previous Module</button>
            <button id="nextModuleBtn" onclick="nextModule()" class="action-button next-button-locked">Next Module</button>
        </div>
    </div>

    <script>
        let currentModuleIndex = 0;
        const totalModules = 6;
        const quizScores = {};
        const passingScore = 0.8;

        const allQuizzes = {
            1: [
                { question: "Which of the following is the broadest concept?", options: ["Deep Learning", "Artificial Intelligence (AI)", "Machine Learning (ML)", "Robotics"], correct: 1, explanation: "Artificial Intelligence is the overarching field, with Machine Learning as a subset and Deep Learning as a subset of ML." },
                { question: "What is the primary goal of Supervised Learning?", options: ["To find hidden patterns in unlabeled data", "To learn from labeled data to make predictions on new data", "To learn by interacting with an environment through rewards and penalties", "To create new features from existing data"], correct: 1, explanation: "Supervised learning models are trained on labeled datasets, where each data point is tagged with a correct output." },
                { question: "An algorithm that groups customers into segments based on their purchasing habits without any prior labels is an example of:", options: ["Supervised Learning", "Reinforcement Learning", "Unsupervised Learning", "Deep Learning"], correct: 2, explanation: "Unsupervised learning is used to find hidden patterns or structures within unlabeled data." },
                { question: "What is the primary purpose of the NumPy library in an AI/ML environment?", options: ["To create interactive visualizations", "To manage software packages and environments", "To perform efficient numerical computations with multi-dimensional arrays", "To build and train deep neural networks"], correct: 2, explanation: "NumPy is a fundamental package for numerical computation in Python and provides support for large, multi-dimensional arrays and matrices." },
                { question: "Which term is best described as 'training a machine to play a game by rewarding it for winning and penalizing it for losing'?", options: ["Supervised Learning", "Unsupervised Learning", "Reinforcement Learning", "Transfer Learning"], correct: 2, explanation: "Reinforcement learning models learn by interacting with an environment and receiving rewards or penalties." }
            ],
            2: [
                { question: "From Module 1: What is the relationship between AI, ML, and DL?", options: ["AI and ML are the same, with DL being a subset.", "ML is a subset of AI, and DL is a subset of ML.", "DL is a subset of AI, and ML is a subset of DL.", "They are three unrelated fields."], correct: 1, explanation: "AI is the broadest concept, followed by ML, and then DL as a more specialized subset of ML." },
                { question: "What is the primary purpose of data preprocessing in machine learning?", options: ["To make the data look visually appealing in charts", "To prepare and transform raw data into a suitable format for ML algorithms", "To reduce the amount of data to save storage space", "To encrypt sensitive information in the dataset"], correct: 1, explanation: "Data preprocessing transforms raw data into a clean, structured format that ML algorithms can effectively use, improving model performance and reliability." },
                { question: "Which metric is most appropriate for evaluating a regression model?", options: ["Accuracy", "Precision", "Mean Squared Error (MSE)", "F1 Score"], correct: 2, explanation: "Mean Squared Error (MSE) measures the average squared difference between predicted and actual values, making it suitable for regression tasks where we predict continuous values." },
                { question: "What does the term 'feature engineering' refer to?", options: ["The process of selecting which machine learning algorithm to use", "Creating new features from existing data to improve model performance", "Engineering a system to automatically collect more data", "The process of tuning model hyperparameters"], correct: 1, explanation: "Feature engineering involves creating new features from existing data to help the model better understand patterns, which can significantly improve model performance." },
                { question: "What is the difference between overfitting and underfitting?", options: ["Overfitting is when the model is too simple, underfitting is when it is too complex.", "Overfitting occurs on test data, while underfitting occurs on training data.", "Overfitting is when the model learns noise in the data, underfitting is when it fails to capture the underlying pattern.", "There is no difference; they are different terms for the same concept."], correct: 2, explanation: "Overfitting results in a model that performs well on training data but poorly on unseen data. Underfitting is when the model is too simple and performs poorly on both." }
            ],
            3: [
                { question: "From Module 2: A confusion matrix is used to evaluate the performance of which type of model?", options: ["Regression", "Clustering", "Classification", "Anomaly Detection"], correct: 2, explanation: "A confusion matrix shows the number of true positives, false positives, true negatives, and false negatives for a classification model." },
                { question: "What is the primary purpose of a neural network's activation function?", options: ["To add non-linearity to the network's output", "To speed up the training process", "To increase the number of layers", "To handle missing data"], correct: 0, explanation: "Activation functions introduce non-linearity, allowing the network to learn more complex, non-linear patterns in the data." },
                { question: "Which algorithm is used in deep learning to efficiently update a neural network's weights during training?", options: ["K-Means", "Logistic Regression", "Backpropagation", "Decision Trees"], correct: 2, explanation: "Backpropagation is the key algorithm that calculates and propagates the error gradients backward through the network to update the weights." },
                { question: "In a CNN, what is the main purpose of a 'convolutional layer'?", options: ["To reduce the spatial dimensions of the feature maps", "To flatten the input data into a single vector", "To extract features like edges and textures from the input image", "To apply a non-linear activation function to the data"], correct: 2, explanation: "Convolutional layers apply filters to the image to automatically learn and extract hierarchical features." },
                { question: "What is a major benefit of using transfer learning?", options: ["It requires a larger dataset to achieve good performance.", "It makes the model less complex and easier to interpret.", "It significantly reduces training time and can lead to better performance with limited data.", "It is only used for unsupervised learning tasks."], correct: 2, explanation: "Transfer learning leverages a pre-trained model on a large dataset, allowing you to fine-tune it for a related task with much less data and computational resources." }
            ],
            4: [
                { question: "From Module 3: What is the main purpose of a 'hidden layer' in a neural network?", options: ["To receive the raw input data", "To perform complex computations and transformations on the data", "To produce the final prediction", "To manage the network's overall structure"], correct: 1, explanation: "Hidden layers are where the primary computations happen, allowing the network to learn intricate patterns from the data." },
                { question: "What is the main difference between stemming and lemmatization?", options: ["Stemming is a more accurate process that considers context.", "Lemmatization is faster but less accurate.", "Stemming is a crude process that often chops off the end of words, while lemmatization reduces words to their meaningful base form.", "They are two different names for the exact same process."], correct: 2, explanation: "Lemmatization is a more sophisticated process that uses a dictionary to find the root form, whereas stemming is a heuristic that may result in non-words." },
                { question: "What is a 'word embedding'?", options: ["A method to count word frequencies", "A binary representation of a word", "A numerical vector that captures a word's meaning and relationships", "A list of stop words"], correct: 2, explanation: "Word embeddings allow machine learning models to understand the semantic relationships between words by representing them as dense vectors in a high-dimensional space." },
                { question: "Which NLP task involves assigning a sentiment (e.g., positive, negative, neutral) to a piece of text?", options: ["Text Classification", "Machine Translation", "Sentiment Analysis", "Named Entity Recognition"], correct: 2, explanation: "Sentiment analysis is a specific type of text classification where the goal is to determine the emotional tone of the text." },
                { question: "What is a key feature of the Transformer architecture?", options: ["It uses a single, massive recurrent layer.", "It relies on a self-attention mechanism to weigh the importance of different words.", "It is designed only for text generation tasks.", "It is the predecessor to simple RNNs."], correct: 1, explanation: "The self-attention mechanism is what makes the Transformer so effective at understanding context and relationships in long sequences of text." }
            ],
            5: [
                { question: "From Module 4: What is the purpose of lemmatization?", options: ["To convert text into images for computer vision models.", "To reduce a word to its crude root form by chopping off its end.", "To remove common words like 'the' and 'a' from text.", "To reduce a word to its meaningful base form considering its context."], correct: 3, explanation: "Lemmatization is a sophisticated text preprocessing step that reduces words to their meaningful base or dictionary form, unlike stemming which is a crude process." },
                { question: "What is the main function of an image's 'channels' in the RGB model?", options: ["To represent the image's resolution.", "To determine the image's brightness.", "To represent the intensity of red, green, and blue colors.", "To compress the image file size."], correct: 2, explanation: "In the RGB model, each channel corresponds to one of the primary colors (Red, Green, or Blue) and stores its intensity value for each pixel." },
                { question: "Which image preprocessing technique helps prevent a model from overfitting to the training data?", options: ["Resizing", "Grayscale conversion", "Augmentation", "Normalization"], correct: 2, explanation: "Image augmentation creates new training examples by applying random transformations (like rotation or flipping) to existing images, increasing data diversity and helping the model generalize better." },
                { question: "What is the key difference between Object Detection and Image Segmentation?", options: ["Object detection identifies and locates objects with a bounding box, while segmentation classifies each pixel.", "Object detection is only for video, while segmentation is for static images.", "Segmentation is an older technique than object detection.", "They are the same process, just with a different name."], correct: 0, explanation: "Object detection aims to find objects in an image and draw a bounding box around them. Image segmentation is more granular; it classifies every single pixel in an image to determine what object it belongs to, providing more precise outlines." },
                { question: "What is a major benefit of using a pre-trained model for computer vision?", options: ["It requires a larger training dataset.", "It is always more accurate than a custom-trained model.", "It allows you to get good performance with less data and computational power.", "It can only be used for image classification tasks."], correct: 2, explanation: "Pre-trained models have learned a wealth of features from large public datasets. This saves you time and resources, as you only need to fine-tune the model for your specific task." }
            ],
            6: [
                { question: "From Module 5: What is the primary purpose of image normalization?", options: ["To convert an image from RGB to grayscale.", "To reduce the image file size.", "To resize the image to a standard dimension.", "To scale pixel values to a fixed range (e.g., 0 to 1)"], correct: 3, explanation: "Normalization scales pixel values to a standard range, which helps to stabilize and accelerate the training of neural networks." },
                { question: "What are the three main components of a Reinforcement Learning problem?", options: ["Input, Hidden Layer, Output", "Data, Model, Prediction", "Agent, Environment, Reward", "Text, Image, Audio"], correct: 2, explanation: "An RL agent learns by interacting with an environment, and receives rewards for desired behaviors, which guides its learning process." },
                { question: "Which of the following is an example of Generative AI?", options: ["A model that predicts house prices based on features.", "A system that classifies emails as spam or not spam.", "A model that generates new, realistic images of human faces.", "A system that clusters customer data into segments."], correct: 2, explanation: "Generative AI is a type of AI that generates new content, such as text, images, or audio, rather than analyzing or classifying existing data." },
                { question: "Which project follows the Safe Agent Rules?", options: ["A study helper that recommends review topics and explains why.", "An agent that tries to bypass website security.", "An agent that collects private passwords for convenience.", "An agent that sends messages from someone else's account without approval."], correct: 0, explanation: "A safe beginner agent has a narrow helpful purpose, protects privacy, avoids harmful actions, and keeps a human in control." },
                { question: "What should you define before coding your own AI agent?", options: ["Purpose, allowed inputs, allowed actions, blocked actions, and explanation style.", "Only the name of the project.", "A way to avoid all human approval.", "A list of private accounts to access."], correct: 0, explanation: "Planning the agent's scope, inputs, actions, blocked actions, and explanations keeps the project realistic, useful, and safe." }
            ]
        };

        const quizContainers = {};

        function loadQuiz(moduleIndex) {
            const quizContainerId = `quiz${moduleIndex}-questions`;
            let quizHTML = '';
            allQuizzes[moduleIndex].forEach((q, qIndex) => {
                quizHTML += `<div class="mb-4">
                    <p class="font-bold mb-2 text-white">Q${qIndex + 1}: ${q.question}</p>
                    <div class="space-y-2">`;
                q.options.forEach((option, oIndex) => {
                    quizHTML += `<button class="quiz-option p-3 rounded-md" type="button" data-question="${qIndex}" data-option="${oIndex}">${option}</button>`;
                });
                quizHTML += `</div>
                </div>`;
            });
            document.getElementById(quizContainerId).innerHTML = quizHTML;
            quizContainers[moduleIndex] = document.getElementById(quizContainerId);
            quizContainers[moduleIndex].addEventListener('click', handleOptionClick);
        }

        function handleOptionClick(event) {
            const target = event.target.closest('.quiz-option');
            if (!target) return;
            const questionIndex = parseInt(target.dataset.question);
            const container = target.closest('.quiz-container');
            const options = container.querySelectorAll(`[data-question="${questionIndex}"]`);
            options.forEach(opt => opt.classList.remove('selected-answer'));
            target.classList.add('selected-answer');
        }

        function runQuiz(moduleIndex) {
            const questions = allQuizzes[moduleIndex];
            let correctAnswers = 0;
            const resultsDiv = document.getElementById(`quiz${moduleIndex}-results`);
            resultsDiv.innerHTML = '';

            questions.forEach((q, qIndex) => {
                const selectedOption = quizContainers[moduleIndex].querySelector(`.quiz-option[data-question="${qIndex}"].selected-answer`);
                const isCorrect = selectedOption && parseInt(selectedOption.dataset.option) === q.correct;
                const resultText = document.createElement('p');

                if (isCorrect) {
                    correctAnswers++;
                    resultText.innerHTML = `✅ <strong>Question ${qIndex + 1}: Correct!</strong> ${q.explanation}`;
                    selectedOption.classList.add('correct-answer');
                    selectedOption.classList.remove('selected-answer');
                } else {
                    resultText.innerHTML = `❌ <strong>Question ${qIndex + 1}: Incorrect.</strong> Correct answer was: "${q.options[q.correct]}". ${q.explanation}`;
                    if (selectedOption) {
                        selectedOption.classList.add('incorrect-answer');
                        selectedOption.classList.remove('selected-answer');
                    }
                    const correctOption = quizContainers[moduleIndex].querySelector(`.quiz-option[data-question="${qIndex}"][data-option="${q.correct}"]`);
                    if (correctOption) {
                         correctOption.classList.add('correct-answer');
                    }
                }
                resultsDiv.appendChild(resultText);
            });

            const score = correctAnswers / questions.length;
            quizScores[moduleIndex] = score;

            const finalResult = document.createElement('h4');
            const nextModuleBtn = document.getElementById('nextModuleBtn');
            const previousModuleBtn = document.getElementById('previousModuleBtn');

            if (score >= passingScore) {
                const nextActionText = moduleIndex === totalModules ? 'finish the course' : 'proceed to the next module';
                finalResult.innerHTML = `<strong>Quiz Passed!</strong> You scored ${Math.round(score * 100)}%. You can now ${nextActionText}.`;
                finalResult.className = "text-xl font-bold text-green-400 mt-4";
                if (nextModuleBtn) nextModuleBtn.classList.remove('next-button-locked');

            } else {
                finalResult.innerHTML = `<strong>Quiz Failed.</strong> You scored ${Math.round(score * 100)}%. Please review the material and try again.`;
                finalResult.className = "text-xl font-bold text-red-400 mt-4";
                if (nextModuleBtn) nextModuleBtn.classList.add('next-button-locked');
            }
            resultsDiv.prepend(finalResult);
            resultsDiv.classList.remove('hidden');
        }

        async function loadModuleContent(moduleIndex) {
            const container = document.getElementById('course-content-container');
            const moduleFileName = `module${moduleIndex}.html`;
            const moduleUrl = `./Modules/${moduleFileName}`;

            try {
                const response = await fetch(moduleUrl);
                if (!response.ok) {
                    throw new Error(`Failed to load module ${moduleIndex}: ${response.statusText}`);
                }
                const htmlContent = await response.text();
                container.innerHTML = htmlContent;
                enhanceModuleContent(moduleIndex);

                if (allQuizzes[moduleIndex]) {
                    loadQuiz(moduleIndex);
                }
                setupLessonPager(moduleIndex);

                const nextModuleBtn = document.getElementById('nextModuleBtn');
                const previousModuleBtn = document.getElementById('previousModuleBtn');

                nextModuleBtn.style.display = 'block';

                if (moduleIndex === 1) {
                    previousModuleBtn.style.display = 'none';
                } else {
                    previousModuleBtn.style.display = 'block';
                }

                if (moduleIndex === totalModules) {
                    nextModuleBtn.innerHTML = 'Finish Course';
                } else {
                    nextModuleBtn.innerHTML = 'Next Module';
                }

                if (quizScores[moduleIndex] && quizScores[moduleIndex] >= passingScore) {
                    nextModuleBtn.classList.remove('next-button-locked');
                } else {
                    nextModuleBtn.classList.add('next-button-locked');
                }

            } catch (error) {
                container.innerHTML = `<div class="text-red-500 font-bold">Error: ${error.message}</div>`;
            }
        }

        function enhanceModuleContent(moduleIndex) {
            const container = document.getElementById('course-content-container');
            const contentRoot = container.querySelector('.prose') || container;
            contentRoot.classList.add('module-content');

            const moduleTitle = container.querySelector('h2');
            if (moduleTitle) {
                moduleTitle.insertAdjacentHTML('beforebegin', '<div class="page-label">Module</div>');
            }

            const quizContainer = container.querySelector('.quiz-container');
            if (quizContainer) {
                quizContainer.classList.add('course-page');
                quizContainer.insertAdjacentHTML('afterbegin', '<div class="page-label">Knowledge Check</div>');
            }

            container.querySelectorAll('.bg-terminal-code').forEach((block) => {
                if (block.closest('.quiz-container')) return;
                block.classList.add('course-page');
                if (!block.querySelector('.page-label')) {
                    block.insertAdjacentHTML('afterbegin', '<div class="page-label">Code Practice</div>');
                }
            });

            container.querySelectorAll('pre.jupyter-code code').forEach((codeBlock, index) => {
                const codeText = codeBlock.textContent.trimEnd();
                const codePanel = codeBlock.closest('.bg-terminal-code') || codeBlock.closest('pre');
                if (!codePanel || codePanel.nextElementSibling?.classList.contains('code-workspace')) return;

                const workspace = document.createElement('div');
                workspace.className = 'code-workspace';
                workspace.innerHTML = `
                    <label for="practice-editor-${moduleIndex}-${index}">Write your own version here</label>
                    <textarea id="practice-editor-${moduleIndex}-${index}" class="practice-editor" spellcheck="false" wrap="off">${codeText}</textarea>
                    <div class="workspace-actions">
                        <button class="action-button reset-practice" type="button">Reset to example</button>
                        <button class="action-button copy-practice" type="button">Copy my code</button>
                    </div>
                    <p class="workspace-note">Run this in your notebook or Python environment. Make one small change, run it, and explain what changed before moving on.</p>
                `;
                codePanel.insertAdjacentElement('afterend', workspace);
            });

            container.querySelectorAll('.reset-practice').forEach((button) => {
                button.addEventListener('click', () => {
                    const workspace = button.closest('.code-workspace');
                    const example = workspace.previousElementSibling.querySelector('code')?.textContent.trimEnd() || '';
                    workspace.querySelector('textarea').value = example;
                });
            });

            container.querySelectorAll('.copy-practice').forEach((button) => {
                button.addEventListener('click', async () => {
                    const textarea = button.closest('.code-workspace').querySelector('textarea');
                    await navigator.clipboard.writeText(textarea.value);
                    button.textContent = 'Copied';
                    setTimeout(() => { button.textContent = 'Copy my code'; }, 1200);
                });
            });
        }

        function setupLessonPager(moduleIndex) {
            const container = document.getElementById('course-content-container');
            const contentRoot = container.querySelector('.prose') || container;
            if (contentRoot.querySelector('.lesson-pager')) return;

            const originalChildren = Array.from(contentRoot.children);
            const pages = [];
            let currentPage = null;

            const createPage = (label) => {
                const page = document.createElement('section');
                page.className = 'lesson-page';
                page.dataset.pageLabel = label;
                pages.push(page);
                return page;
            };

            const flushCurrentPage = () => {
                if (currentPage && currentPage.childElementCount > 0) {
                    contentRoot.appendChild(currentPage);
                }
                currentPage = null;
            };

            originalChildren.forEach((child) => {
                if (child.parentElement?.classList.contains('lesson-page')) return;

                const isQuiz = child.classList.contains('quiz-container');
                const isCoursePage = child.classList.contains('course-page');
                const isWorkspace = child.classList.contains('code-workspace');

                if (isQuiz) {
                    flushCurrentPage();
                    const quizPage = createPage('Knowledge Check');
                    quizPage.appendChild(child);
                    contentRoot.appendChild(quizPage);
                    return;
                }

                if (isCoursePage || isWorkspace) {
                    flushCurrentPage();
                    const label = child.querySelector('.page-label')?.textContent || (isWorkspace ? 'Code Practice' : 'Course Page');
                    const page = createPage(label);
                    page.appendChild(child);

                    let next = originalChildren[originalChildren.indexOf(child) + 1];
                    if (isCoursePage && next && next.classList.contains('code-workspace')) {
                        page.appendChild(next);
                    }

                    if (!page.isConnected) {
                        contentRoot.appendChild(page);
                    }
                    return;
                }

                if (!currentPage) {
                    currentPage = createPage('Lesson Page');
                    currentPage.insertAdjacentHTML('afterbegin', '<div class="page-label">Lesson Page</div>');
                }
                currentPage.appendChild(child);
            });

            flushCurrentPage();

            const activePages = Array.from(contentRoot.querySelectorAll(':scope > .lesson-page'));
            if (activePages.length === 0) return;

            let activeIndex = 0;
            const pager = document.createElement('div');
            pager.className = 'lesson-pager';
            pager.innerHTML = `
                <button class="action-button lesson-prev-page" type="button">Previous Page</button>
                <div class="lesson-pager-status" aria-live="polite"></div>
                <button class="action-button lesson-next-page" type="button">Next Page</button>
            `;
            contentRoot.insertBefore(pager, activePages[0]);

            const updatePager = () => {
                activePages.forEach((page, index) => {
                    page.classList.toggle('active-page', index === activeIndex);
                });
                const status = pager.querySelector('.lesson-pager-status');
                const prev = pager.querySelector('.lesson-prev-page');
                const next = pager.querySelector('.lesson-next-page');
                const label = activePages[activeIndex].dataset.pageLabel || 'Page';
                status.textContent = `${label} ${activeIndex + 1} of ${activePages.length}`;
                prev.disabled = activeIndex === 0;
                next.disabled = activeIndex === activePages.length - 1;
            };

            pager.querySelector('.lesson-prev-page').addEventListener('click', () => {
                if (activeIndex > 0) {
                    activeIndex -= 1;
                    updatePager();
                    pager.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });

            pager.querySelector('.lesson-next-page').addEventListener('click', () => {
                if (activeIndex < activePages.length - 1) {
                    activeIndex += 1;
                    updatePager();
                    pager.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });

            updatePager();
        }

        function nextModule() {
            if (currentModuleIndex < totalModules && quizScores[currentModuleIndex] >= passingScore) {
                currentModuleIndex++;
                updateProgressBar();
                loadModuleContent(currentModuleIndex);
                window.scrollTo(0, 0);
            } else if (currentModuleIndex === totalModules && quizScores[currentModuleIndex] >= passingScore) {
                finishCourse();
            }
        }

        function previousModule() {
            if (currentModuleIndex > 1) {
                currentModuleIndex--;
                updateProgressBar();
                loadModuleContent(currentModuleIndex);
                window.scrollTo(0, 0);
            }
        }

        function updateProgressBar() {
            const progress = (currentModuleIndex / totalModules) * 100;
            const progressBar = document.getElementById('progressBar');
            if (progressBar) {
                progressBar.style.width = `${progress}%`;
            }
        }

        function finishCourse() {
            const container = document.getElementById('course-content-container');
            const nextModuleBtn = document.getElementById('nextModuleBtn');
            const previousModuleBtn = document.getElementById('previousModuleBtn');

            container.innerHTML = `<div class="completion-message">
                <h2>Course Complete</h2>
                <p>You completed all six AI and Machine Learning modules.</p>
                <p>Next step: build the Module 6 capstone project and add it to your portfolio.</p>
            </div>`;

            if (nextModuleBtn) {
                nextModuleBtn.style.display = 'none';
            }
            if (previousModuleBtn) {
                previousModuleBtn.style.display = 'block';
            }
            window.scrollTo(0, 0);
        }

        window.onload = () => {
            currentModuleIndex = 1;
            updateProgressBar();
            loadModuleContent(currentModuleIndex);
        };
    </script>
</body>
</html>
